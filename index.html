<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Referral Fee Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0e14;
      --surface: #13161f;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #c8a96e;
      --accent2: #7eb8a4;
      --text: #e8e4dc;
      --muted: #6b7280;
      --danger: #e07070;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    header { margin-bottom: 40px; }

    .firm-tag {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      opacity: 0.8;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      background: var(--surface);
      padding: 4px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--accent);
      color: #0b0e14;
      font-weight: 600;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 16px;
    }

    .field-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 24px;
    }

    .prefix {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
      pointer-events: none;
    }

    input[type="number"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px 14px 44px;
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

    input[type="number"]:focus { border-color: var(--accent); }

    .select-wrap { position: relative; }

    select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 44px 14px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      color: var(--text);
      outline: none;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }

    select:focus { border-color: var(--accent); }
    select option { background: #1a1e2a; color: var(--text); }

    .select-arrow {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--accent);
      font-size: 14px;
    }

    .results-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .results-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .results-header span {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .tier-pill {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .result-row:last-child { border-bottom: none; }

    .result-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .result-sublabel {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .result-value {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }

    .result-value.highlight {
      color: var(--accent);
      font-size: 22px;
      font-weight: 700;
    }

    .result-value.dim { color: var(--muted); }
    .result-value.red { color: var(--danger); }
    .result-value.green { color: var(--accent2); }

    .bar-section {
      padding: 18px 24px;
      border-top: 1px solid var(--border);
    }

    .bar-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .bar-track {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      margin-bottom: 10px;
    }

    .bar-seg { height: 100%; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
    .bar-firm     { background: var(--accent2); }
    .bar-discount { background: var(--danger); opacity: 0.7; }
    .bar-referral { background: var(--accent); }

    .bar-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .notice {
      background: rgba(224,112,112,0.08);
      border: 1px solid rgba(224,112,112,0.25);
      border-radius: 8px;
      padding: 14px 18px;
      font-size: 11px;
      color: var(--danger);
      letter-spacing: 0.5px;
      line-height: 1.7;
      margin-bottom: 16px;
      display: none;
    }

    .notice.show { display: block; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1px;
    }

    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

    footer {
      margin-top: 32px;
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
      line-height: 1.8;
      opacity: 0.5;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <p class="firm-tag">Referral Calculator</p>
    <h1>How much will<br/>you <span>earn?</span></h1>
    <p class="subtitle">Based on SRO 2023 · Agents & Bankers</p>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="setTab('agent', this)">Property Agent</button>
    <button class="tab" onclick="setTab('banker', this)">Banker</button>
  </div>

  <div class="card">
    <p class="field-label">
      <span id="amount-label">Property Price</span>
      <span class="badge" id="tier-badge">—</span>
    </p>
    <div class="input-wrap">
      <span class="prefix">RM</span>
      <input type="number" id="amount" placeholder="0" min="0" oninput="calculate()" />
    </div>

    <div id="discount-section">
      <p class="field-label">Client Discount Requested</p>
      <div class="select-wrap">
        <select id="discount" onchange="calculate()">
          <option value="0">No discount</option>
          <option value="5">5%</option>
          <option value="10">10%</option>
          <option value="15">15%</option>
          <option value="20">20%</option>
          <option value="25">25%</option>
          <option value="30">30%</option>
          <option value="35">35%</option>
          <option value="40">40%</option>
          <option value="45">45%</option>
          <option value="50">50%</option>
          <option value="55">55%</option>
          <option value="60">60%</option>
          <option value="65">65%</option>
          <option value="70">70%</option>
        </select>
        <span class="select-arrow">▾</span>
      </div>
    </div>
  </div>

  <div class="notice" id="notice"></div>

  <div id="results-wrap">
    <div class="empty-state">
      <div class="empty-icon">◈</div>
      Enter an amount to see your referral
    </div>
  </div>

  <footer>
    Scale fees per Solicitors' Remuneration Order 2023<br/>
    Effective 15 July 2023 · Peninsular Malaysia
  </footer>

</div>
<script>
  function setTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('amount-label').textContent =
      tab === 'banker' ? 'Loan Amount' : 'Property Price';
    calculate();
  }

  function calcLegalFees(amount) {
    if (amount <= 0) return 0;
    if (amount <= 500000) return Math.max(amount * 0.0125, 500);
    return (500000 * 0.0125) + ((amount - 500000) * 0.01);
  }

  function getTier(amount) {
    if (amount < 300000)  return { label: '< RM300k',     referralPct: 0,    flat: true  };
    if (amount < 500000)  return { label: 'RM300k–500k',  referralPct: 0.60, flat: false };
    if (amount < 1000000) return { label: 'RM500k–1mil',  referralPct: 0.65, flat: false };
                          return { label: 'RM1mil+',       referralPct: 0.75, flat: false };
  }

  function fmt(n) {
    return 'RM ' + n.toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function calculate() {
    const amount     = parseFloat(document.getElementById('amount').value) || 0;
    const discountPct = parseFloat(document.getElementById('discount').value) / 100;
    const notice     = document.getElementById('notice');
    const wrap       = document.getElementById('results-wrap');
    const discSec    = document.getElementById('discount-section');

    notice.className = 'notice';

    if (amount <= 0) {
      document.getElementById('tier-badge').textContent = '—';
      wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">◈</div>Enter an amount to see your referral</div>`;
      return;
    }

    const fees = calcLegalFees(amount);
    const tier = getTier(amount);
    document.getElementById('tier-badge').textContent = tier.label;

    // Below 300k
    if (tier.flat) {
      document.getElementById('discount').value = 0;
      discSec.style.opacity = '0.4';
      discSec.style.pointerEvents = 'none';
      const flatReferral = Math.max(fees - 1500, 0);
      if (flatReferral === 0) {
        notice.textContent = 'Legal fees too low — firm minimum of RM1,500 not covered. No referral payable.';
        notice.className = 'notice show';
      }
      wrap.innerHTML = buildResults({ fees, firmEarns: 1500, referral: flatReferral, discountAmt: 0, discountPct: 0, tier, flat: true, effectivePct: 0 });
      return;
    }

    discSec.style.opacity = '1';
    discSec.style.pointerEvents = 'auto';

    const effectivePct   = Math.max(tier.referralPct - discountPct, 0);
    const referral       = fees * effectivePct;
    const discountAmt    = fees * discountPct;
    const firmEarns      = fees - referral - discountAmt;

    if (effectivePct === 0 && discountPct > 0) {
      notice.textContent = `Discount (${Math.round(discountPct*100)}%) exceeds or equals the referral tier (${Math.round(tier.referralPct*100)}%). No referral payable.`;
      notice.className = 'notice show';
    }

    wrap.innerHTML = buildResults({ fees, firmEarns, referral, discountAmt, discountPct, tier, flat: false, effectivePct });
  }

  function buildResults({ fees, firmEarns, referral, discountAmt, discountPct, tier, flat, effectivePct }) {
    const firmBar     = Math.max(0, Math.round((firmEarns / fees) * 100));
    const discountBar = Math.round((discountAmt / fees) * 100);
    const referralBar = Math.round((referral / fees) * 100);

    const referralDisplay = flat
      ? (referral > 0 ? fmt(referral) : 'RM 0.00')
      : fmt(referral);
    const referralClass = referral > 0 ? 'highlight' : 'dim';
    const pctNote = flat
      ? (referral > 0 ? 'Legal fees − RM1,500 firm minimum' : 'Legal fees too low for referral')
      : (effectivePct > 0 ? `${Math.round(effectivePct * 100)}% of legal fees` : 'No referral at this discount');

    return `
      <div class="results-card">
        <div class="results-header">
          <span>Breakdown</span>
          <span class="tier-pill">${tier.label}</span>
        </div>

        <div class="result-row">
          <span class="result-label">Scale Legal Fees</span>
          <span class="result-value">${fmt(fees)}</span>
        </div>

        ${discountPct > 0 ? `
        <div class="result-row">
          <span class="result-label">Client Discount (${Math.round(discountPct*100)}%)</span>
          <span class="result-value red">− ${fmt(discountAmt)}</span>
        </div>` : ''}

        <div class="result-row">
          <span class="result-label">Firm Fees</span>
          <span class="result-value green">${fmt(firmEarns)}</span>
        </div>

        <div class="result-row" style="background:rgba(200,169,110,0.04)">
          <div>
            <div class="result-label">Your Referral</div>
            ${pctNote ? `<div class="result-sublabel">${pctNote}</div>` : ''}
          </div>
          <span class="result-value ${referralClass}">${referralDisplay}</span>
        </div>

        <div class="bar-section">
          <div class="bar-label">Fee Distribution</div>
          <div class="bar-track">
            <div class="bar-seg bar-firm"     style="width:${firmBar}%"></div>
            <div class="bar-seg bar-discount" style="width:${discountBar}%"></div>
            <div class="bar-seg bar-referral" style="width:${referralBar}%"></div>
          </div>
          <div class="bar-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div>Firm</div>
            ${discountPct > 0 ? `<div class="legend-item"><div class="legend-dot" style="background:var(--danger);opacity:0.7"></div>Discount</div>` : ''}
            <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Your Referral</div>
          </div>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
